version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: src/AiCopilot.Api/Dockerfile
    image: aicopilot-api:latest
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  worker:
    build:
      context: .
      dockerfile: src/AiCopilot.Worker/Dockerfile
    image: aicopilot-worker:latest
    environment:
      DOTNET_ENVIRONMENT: Development
    depends_on:
      - api
